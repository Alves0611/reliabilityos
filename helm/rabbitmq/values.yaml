image:
  registry: docker.io
  repository: bitnamilegacy/rabbitmq
  tag: 4.1.3-debian-12-r1

global:
  security:
    allowInsecureImages: true

auth:
  username: guest
  password: guest

persistence:
  enabled: true
  size: 5Gi
  storageClass: gp2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true