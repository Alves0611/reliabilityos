apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-slo-overview
  labels:
    grafana_dashboard: "1"
data:
  slo-overview.json: |
    {
      "uid": "slo-overview",
      "title": "SLO Overview",
      "tags": ["reliabilityos", "sre", "slo"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "style": "dark",
      "editable": true,
      "panels": [
        {
          "type": "row",
          "title": "SLO Status",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "collapsed": false
        },
        {
          "type": "stat",
          "title": "API Availability",
          "id": 2,
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sli:http_requests:availability:rate1h",
              "refId": "A",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 0.995, "color": "yellow" },
                  { "value": 0.999, "color": "green" }
                ]
              },
              "decimals": 3
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "API Latency p95",
          "id": 3,
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sli:http_request_duration:p95:rate5m * 1000",
              "refId": "A",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 200, "color": "yellow" },
                  { "value": 500, "color": "red" }
                ]
              },
              "decimals": 1
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Worker Success Rate",
          "id": 4,
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sli:worker:success_rate:rate1h",
              "refId": "A",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 0.99, "color": "yellow" },
                  { "value": 0.995, "color": "green" }
                ]
              },
              "decimals": 3
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "row",
          "title": "Error Budget",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 5,
          "collapsed": false
        },
        {
          "type": "gauge",
          "title": "API Error Budget Remaining",
          "id": 6,
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "slo:orders_api:error_budget:remaining * 100",
              "refId": "A",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 25, "color": "yellow" },
                  { "value": 50, "color": "green" }
                ]
              },
              "decimals": 1
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          }
        },
        {
          "type": "stat",
          "title": "API Burn Rate (1h)",
          "id": 7,
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "slo:orders_api:burn_rate:1h",
              "refId": "A",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "yellow" },
                  { "value": 6, "color": "red" }
                ]
              },
              "decimals": 2
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "type": "gauge",
          "title": "Worker Error Budget",
          "id": 8,
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "slo:worker:error_budget:remaining * 100",
              "refId": "A",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 25, "color": "yellow" },
                  { "value": 50, "color": "green" }
                ]
              },
              "decimals": 1
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          }
        },
        {
          "type": "row",
          "title": "Trends",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 9,
          "collapsed": false
        },
        {
          "type": "timeseries",
          "title": "Availability Over Time",
          "id": 10,
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sli:http_requests:availability:rate5m",
              "refId": "A",
              "legendFormat": "Availability"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 0.999, "color": "red" }
                ]
              },
              "decimals": 4
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "type": "timeseries",
          "title": "Latency p95 Over Time",
          "id": 11,
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 15 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sli:http_request_duration:p95:rate5m * 1000",
              "refId": "A",
              "legendFormat": "p95 Latency"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 200, "color": "red" }
                ]
              },
              "decimals": 1
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "type": "timeseries",
          "title": "Error Rate",
          "id": 12,
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "sli:http_requests:error_rate:rate5m or vector(0)",
              "refId": "A",
              "legendFormat": "Error Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "color": { "mode": "fixed", "fixedColor": "red" },
              "decimals": 4
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "type": "timeseries",
          "title": "Error Budget Consumption",
          "id": 13,
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "expr": "slo:orders_api:error_budget:remaining",
              "refId": "A",
              "legendFormat": "Error Budget Remaining"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true
              },
              "decimals": 2
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        }
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": ""
          }
        ]
      },
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      }
    }
