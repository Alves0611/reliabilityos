apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-capacity
  labels:
    grafana_dashboard: "1"
data:
  capacity.json: |
    {
      "uid": "capacity",
      "title": "Capacity Planning",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "style": "dark",
      "editable": true,
      "panels": [
        {
          "type": "row",
          "title": "CPU",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "collapsed": false
        },
        {
          "type": "timeseries",
          "title": "CPU Usage vs Requests",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "lineStyle": { "fill": "solid" }
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "requests" },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": { "fill": "dash", "dash": [10, 10] }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"reliabilityos\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}} usage"
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"reliabilityos\", resource=\"cpu\"}) by (pod)",
              "legendFormat": "{{pod}} requests"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "title": "CPU Utilization %",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 80 }
                ]
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"reliabilityos\", container!=\"\"}[5m])) by (pod) / sum(kube_pod_container_resource_limits{namespace=\"reliabilityos\", resource=\"cpu\"}) by (pod) * 100",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "row",
          "title": "Memory",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "id": 4,
          "collapsed": false
        },
        {
          "type": "timeseries",
          "title": "Memory Usage vs Requests",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "id": 5,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "lineStyle": { "fill": "solid" }
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "requests" },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": { "fill": "dash", "dash": [10, 10] }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"reliabilityos\", container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}} usage"
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"reliabilityos\", resource=\"memory\"}) by (pod)",
              "legendFormat": "{{pod}} requests"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "timeseries",
          "title": "Memory Utilization %",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "id": 6,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 85 }
                ]
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(container_memory_working_set_bytes{namespace=\"reliabilityos\", container!=\"\"}) by (pod) / sum(kube_pod_container_resource_limits{namespace=\"reliabilityos\", resource=\"memory\"}) by (pod) * 100",
              "legendFormat": "{{pod}}"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "row",
          "title": "HPA",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 18 },
          "id": 7,
          "collapsed": false
        },
        {
          "type": "timeseries",
          "title": "HPA Replicas",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 19 },
          "id": 8,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "lineStyle": { "fill": "solid" }
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "max" },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": { "fill": "dash", "dash": [10, 10] }
                  }
                ]
              }
            ]
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"reliabilityos\"}",
              "legendFormat": "{{horizontalpodautoscaler}} current"
            },
            {
              "refId": "B",
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"reliabilityos\"}",
              "legendFormat": "{{horizontalpodautoscaler}} max"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "type": "stat",
          "title": "orders-api replicas",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 19 },
          "id": 9,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"reliabilityos\", horizontalpodautoscaler=~\".*orders-api.*\"}",
              "legendFormat": "current"
            },
            {
              "refId": "B",
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"reliabilityos\", horizontalpodautoscaler=~\".*orders-api.*\"}",
              "legendFormat": "desired"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          }
        },
        {
          "type": "stat",
          "title": "worker replicas",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 19 },
          "id": 10,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"reliabilityos\", horizontalpodautoscaler=~\".*worker.*\"}",
              "legendFormat": "current"
            },
            {
              "refId": "B",
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"reliabilityos\", horizontalpodautoscaler=~\".*worker.*\"}",
              "legendFormat": "desired"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          }
        },
        {
          "type": "row",
          "title": "Storage",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 27 },
          "id": 11,
          "collapsed": false
        },
        {
          "type": "gauge",
          "title": "PVC Usage",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "id": 12,
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "expr": "kubelet_volume_stats_used_bytes{namespace=~\"reliabilityos|logging|monitoring\"} / kubelet_volume_stats_capacity_bytes{namespace=~\"reliabilityos|logging|monitoring\"} * 100",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}"
            }
          ],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        }
      ]
    }
