architecture: standalone

auth:
  enabled: false

master:
  persistence:
    enabled: true
    size: 2Gi
    storageClass: gp2

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
