apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-latency-postgres
  namespace: reliabilityos
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - reliabilityos
    labelSelectors:
      app.kubernetes.io/name: postgresql
  delay:
    latency: "100ms"
    jitter: "20ms"
    correlation: "50"
  duration: "120s"
---
# Hypothesis: Adding 100ms latency to PostgreSQL degrades but doesn't break the API
# Expected: p95 latency < 1s (degraded but functional), no 500 errors
# Blast radius: 100ms added latency to PostgreSQL pod
# Kill switch: kubectl delete networkchaos network-latency-postgres -n reliabilityos
# Validation: Check sli:http_request_duration:p95:rate5m stays <= 1.0
