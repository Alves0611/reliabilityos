apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-orders-api
  namespace: reliabilityos
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - reliabilityos
    labelSelectors:
      app: orders-api
  duration: "60s"
---
# Hypothesis: Killing 1 orders-api pod should not cause SLO violation
# Expected: ReplicaSet recovers pod within 30s, < 1% error rate during recovery
# Blast radius: 1 pod (50% of replicas)
# Kill switch: kubectl delete podchaos pod-kill-orders-api -n reliabilityos
# Validation: Check sli:http_requests:availability:rate5m stays >= 0.99
