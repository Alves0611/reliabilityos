apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-kill-orders-api
  namespace: reliabilityos
spec:
  engineState: active
  appinfo:
    appns: reliabilityos
    applabel: app=orders-api
    appkind: rollout
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: CHAOS_INTERVAL
              value: "30"
            - name: FORCE
              value: "false"
            - name: PODS_AFFECTED_PERC
              value: "50"
        probe:
          - name: orders-api-availability
            type: promProbe
            mode: Continuous
            runProperties:
              probeTimeout: 10s
              interval: 5s
              retry: 3
            promProbe/inputs:
              endpoint: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
              query: sli:http_requests:availability:rate5m
              comparator:
                type: float
                criteria: ">="
                value: "0.99"
---
# Hypothesis: Killing 50% of orders-api pods (1 of 2) should not cause SLO violation
# Expected: ReplicaSet recovers pod within 30s, < 1% error rate during recovery
# Blast radius: 1 pod (50% of replicas)
# Kill switch: kubectl delete chaosengine pod-kill-orders-api -n reliabilityos
# Success criteria: availability probe stays >= 99% throughout experiment
