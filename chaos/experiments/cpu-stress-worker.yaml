apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress-worker
  namespace: reliabilityos
spec:
  mode: all
  selector:
    namespaces:
      - reliabilityos
    labelSelectors:
      app: worker
  stressors:
    cpu:
      workers: 1
      load: 80
  duration: "180s"
---
# Hypothesis: CPU stress on worker should trigger HPA scaling, no orders lost
# Expected: Queue depth increases temporarily, HPA scales worker, queue clears
# Blast radius: 1 worker pod (100% - single replica)
# Kill switch: kubectl delete stresschaos cpu-stress-worker -n reliabilityos
# Validation: All orders eventually processed, no DLQ messages
